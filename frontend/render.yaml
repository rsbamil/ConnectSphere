# ─────────────────────────────────────────────────────────────────────────────
# ConnectSphere Frontend — Render Static Site Blueprint
#
# Add this to the existing render.yaml, or use separately.
#
# Render static sites:
#   1. New → Static Site → connect GitHub repo
#   2. Build command:  npm run build
#   3. Publish dir:    dist
#   4. Set VITE_* env vars with your service URLs
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: cs-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      # SPA fallback — all routes serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_AUTH_URL
        sync: false   # https://cs-auth-service.onrender.com
      - key: VITE_POST_URL
        sync: false   # https://cs-post-service.onrender.com
      - key: VITE_LIKE_URL
        sync: false   # https://cs-like-service.onrender.com
      - key: VITE_COMMENT_URL
        sync: false   # https://cs-comment-service.onrender.com
      - key: VITE_FOLLOW_URL
        sync: false   # https://cs-follow-service.onrender.com
      - key: VITE_NOTIF_URL
        sync: false   # https://cs-notif-service.onrender.com
      - key: VITE_FEED_URL
        sync: false   # https://cs-feed-service.onrender.com
